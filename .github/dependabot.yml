version: 2
updates:
  # npm (React / docs-site)
  - package-ecosystem: "npm"
    directory: "/src/docs-site"
    schedule:
      interval: "weekly"

  # .NET NuGet
  - package-ecosystem: "nuget"
    directory: "/src/backend"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
